name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore TradingView.Screener.sln
      
    - name: Build
      run: dotnet build TradingView.Screener.sln --configuration Release --no-restore
      
    - name: Test
      run: dotnet test TradingView.Screener.sln --configuration Release --no-build
      
    - name: Pack
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        mkdir -p nupkg
        dotnet pack src/TradingView.Screener/TradingView.Screener.csproj --configuration Release --no-build --output nupkg
        dotnet pack src/TradingView.Screener.Cli/TradingView.Screener.Cli.csproj --configuration Release --no-build --output nupkg
    
    - name: Upload NuGet packages
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: |
          nupkg/*.nupkg
          nupkg/*.snupkg
