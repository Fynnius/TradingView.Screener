name: Bug report
description: Report a reproducible problem in the library or CLI.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce it.
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include code, CLI commands, and any relevant request filters.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      placeholder: "9.0.x"
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: "macOS, Linux, Windows"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add logs, screenshots, or notes about TradingView API behavior if useful.
